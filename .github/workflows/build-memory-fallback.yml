name: Build RetroArch WASM (Memory Fallback)

on:
  workflow_dispatch:
    inputs:
      cores:
        description: '要编译的 cores（逗号分隔）'
        required: false
        default: 'fceumm'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git python3 cmake pkg-config zlib1g-dev p7zip-full

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.51

      - name: Clone RetroArch + apply patches
        run: |
          git clone --depth=1 --branch v1.22.2 https://github.com/libretro/RetroArch.git

          cd RetroArch

          # Patch 1: emscripten_GetProcAddress removed in Emscripten 3.1.51+
          sed -i 's/return emscripten_GetProcAddress(symbol);/return (void*)0;/' gfx/drivers_context/emscriptenwebgl_ctx.c

          # Patch 2: READ_CORE_MEMORY fallback to retro_get_memory_data
          python3 "${{ github.workspace }}/patch_command.py" command.c

          echo "=== Verify patch ==="
          grep -B2 -A10 "RetroPlay" command.c

      - name: Build cores
        run: |
          declare -A CORE_REPOS
          CORE_REPOS["fceumm"]="libretro/libretro-fceumm"
          CORE_REPOS["snes9x"]="libretro/snes9x"
          CORE_REPOS["gambatte"]="libretro/gambatte-libretro"
          CORE_REPOS["mgba"]="libretro/mgba"
          CORE_REPOS["genesis_plus_gx"]="libretro/Genesis-Plus-GX"
          CORE_REPOS["picodrive"]="libretro/picodrive"
          CORE_REPOS["snes9x2010"]="libretro/snes9x2010"

          CORES="${{ github.event.inputs.cores }}"
          mkdir -p dist

          IFS=',' read -ra CORE_LIST <<< "$CORES"
          for CORE in "${CORE_LIST[@]}"; do
            CORE=$(echo "$CORE" | xargs)
            REPO="${CORE_REPOS[$CORE]}"

            if [ -z "$REPO" ]; then
              echo "⚠️  未知 core: $CORE，跳过"
              continue
            fi

            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "🔨 编译 core: $CORE"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

            git clone --depth=1 "https://github.com/${REPO}.git" "core_${CORE}"
            cd "core_${CORE}"

            # core 编译（使用默认 -O3，和 frontend 一致）
            emmake make -f Makefile platform=emscripten -j$(nproc) 2>&1 | tail -10

            BC_FILE=$(find . -name "*_libretro_emscripten.bc" -o -name "*_libretro_emscripten.a" | head -1)

            if [ -z "$BC_FILE" ]; then
              echo "❌ core 编译失败: $CORE"
              cd ..
              continue
            fi

            echo "✅ core 编译成功: $BC_FILE"
            cp "$BC_FILE" ../RetroArch/libretro_emscripten.bc
            cd ..

            echo "🔗 链接 RetroArch 前端..."
            cd RetroArch

            # 添加 EMULATE_FUNCTION_POINTER_CASTS=1 到 LDFLAGS
            # 这个参数让 Emscripten 自动处理隐式函数指针类型转换
            # 是防止 call_indirect 崩溃的关键
            # 在 Makefile.emscripten 的 LDFLAGS 定义块之后追加一行
            sed -i '/^LIBS   := -s USE_ZLIB=1/i\LDFLAGS += -s EMULATE_FUNCTION_POINTER_CASTS=1' Makefile.emscripten

            # 关键编译参数：
            # - HAVE_NETWORKING=0: 不需要网络层
            # - 统一 -O2 优化等级（core 和 frontend 一致）
            emmake make -f Makefile.emscripten \
              LIBRETRO="${CORE}" \
              HAVE_OPENGLES3=1 \
              HAVE_NETWORKING=0 \
              -j$(nproc) 2>&1 | tail -30

            if [ -f "${CORE}_libretro.js" ] && [ -f "${CORE}_libretro.wasm" ]; then
              mkdir -p "../dist"
              cp "${CORE}_libretro.js" "../dist/"
              cp "${CORE}_libretro.wasm" "../dist/"
              echo "📦 产物: dist/${CORE}_libretro.js / .wasm"

              # 验证 memory export
              echo "=== 验证 memory fallback ==="
              if grep -q "no memory map defined" "${CORE}_libretro.js"; then
                echo "✅ 包含 memory fallback 逻辑"
              fi
            else
              echo "❌ 链接失败"
            fi

            make -f Makefile.emscripten clean 2>/dev/null || true
            cd ..
          done

      - name: Check output
        run: |
          ls -lh dist/ 2>/dev/null
          echo "Buildbot fceumm: 3066949 bytes"

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: memory-fallback-${{ github.run_number }}
          path: dist/*
