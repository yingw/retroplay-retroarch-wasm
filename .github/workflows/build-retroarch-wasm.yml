name: Build RetroArch WASM (Memory Export)

on:
  workflow_dispatch:
    inputs:
      retroarch_tag:
        description: 'RetroArch 版本 tag'
        required: false
        default: 'v1.22.2'
      cores:
        description: '要编译的 cores（逗号分隔）'
        required: false
        default: 'fceumm'

  push:
    tags:
      - 'release-*'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential git python3 cmake \
            pkg-config zlib1g-dev p7zip-full

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.46
          actions-cache-folder: 'emsdk-cache'

      - name: Cache RetroArch source
        uses: actions/cache@v4
        id: cache-retroarch
        with:
          path: RetroArch
          key: retroarch-src-memory-export-${{ github.event.inputs.retroarch_tag || 'v1.22.2' }}

      - name: Clone RetroArch
        if: steps.cache-retroarch.outputs.cache-hit != 'true'
        run: |
          TAG="${{ github.event.inputs.retroarch_tag || 'v1.22.2' }}"
          git clone --depth=1 --branch "$TAG" https://github.com/libretro/RetroArch.git

      - name: Patch RetroArch for memory export
        run: |
          cd RetroArch

          # 把 memory export 函数直接写入 RetroArch 前端代码（cheevos.c 旁边）
          # 这样 retro_get_memory_data 在同一个编译单元，链接器一定能解析
          cat > cheevos/ra_memory_export.c << 'CEOF'
          #include <emscripten.h>
          #include "libretro.h"

          EMSCRIPTEN_KEEPALIVE
          void* ra_get_ram_ptr(void) {
              return retro_get_memory_data(RETRO_MEMORY_SYSTEM_RAM);
          }

          EMSCRIPTEN_KEEPALIVE
          unsigned ra_get_ram_size(void) {
              return retro_get_memory_size(RETRO_MEMORY_SYSTEM_RAM);
          }
          CEOF

          # 把 ra_memory_export.o 加入 OBJ 列表
          # 必须在 RARCH_OBJ := $(addprefix ...) 之前，因为 := 立即求值
          sed -i '/^RARCH_OBJ/i\OBJ += cheevos/ra_memory_export.o' Makefile.emscripten

          # 把 ra_get_ram_ptr / ra_get_ram_size 加入 EXPORTED_FUNCTIONS
          sed -i 's|EXPORTED_FUNCTIONS = |EXPORTED_FUNCTIONS = _ra_get_ram_ptr,_ra_get_ram_size,|' Makefile.emscripten

          echo "=== 验证 patch ==="
          grep "ra_memory_export" Makefile.emscripten
          grep "_ra_get_ram_ptr" Makefile.emscripten

          echo "=== Patched Makefile.emscripten ==="
          tail -5 Makefile.emscripten

      - name: Build cores
        run: |
          declare -A CORE_REPOS
          CORE_REPOS["fceumm"]="libretro/libretro-fceumm"
          CORE_REPOS["snes9x"]="libretro/snes9x"
          CORE_REPOS["mgba"]="libretro/mgba"
          CORE_REPOS["genesis_plus_gx"]="libretro/Genesis-Plus-GX"
          CORE_REPOS["gambatte"]="libretro/gambatte-libretro"

          CORES="${{ github.event.inputs.cores }}"
          mkdir -p dist

          IFS=',' read -ra CORE_LIST <<< "$CORES"
          for CORE in "${CORE_LIST[@]}"; do
            CORE=$(echo "$CORE" | xargs)
            REPO="${CORE_REPOS[$CORE]}"

            if [ -z "$REPO" ]; then
              echo "⚠️  未知 core: $CORE，跳过"
              continue
            fi

            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "🔨 开始编译 core: $CORE"
            echo "   repo: $REPO"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

            git clone --depth=1 "https://github.com/${REPO}.git" "core_${CORE}"
            cd "core_${CORE}"
            emmake make -f Makefile platform=emscripten -j$(nproc) 2>&1 | tail -30

            BC_FILE=$(find . -name "*_libretro_emscripten.bc" -o -name "*_libretro_emscripten.a" | head -1)

            if [ -z "$BC_FILE" ]; then
              echo "❌ 未找到编译产物，core 编译失败: $CORE"
              cd ..
              continue
            fi

            echo "✅ core 编译成功: $BC_FILE"
            cp "$BC_FILE" ../RetroArch/libretro_emscripten.bc
            cd ..

            echo "🔗 链接 RetroArch 前端..."
            cd RetroArch

            # 编译 + 链接（不含 cheevos，只含 memory export）
            emmake make -f Makefile.emscripten \
              LIBRETRO="${CORE}" \
              HAVE_OPENGLES3=1 \
              HAVE_NETWORKING=0 \
              -j$(nproc) 2>&1 | tail -50

            if [ -f "${CORE}_libretro.js" ] && [ -f "${CORE}_libretro.wasm" ]; then
              mkdir -p "../dist"
              cp "${CORE}_libretro.js" "../dist/"
              cp "${CORE}_libretro.wasm" "../dist/"
              echo "📦 产物已生成: dist/${CORE}_libretro.js / .wasm"

              # 验证 memory export 函数是否导出
              echo "=== 验证 memory export ==="
              if grep -q "_ra_get_ram_ptr\|ra_get_ram_ptr" "${CORE}_libretro.js"; then
                echo "✅ ra_get_ram_ptr 已导出"
              else
                echo "❌ ra_get_ram_ptr 未导出！"
              fi
              if grep -q "_ra_get_ram_size\|ra_get_ram_size" "${CORE}_libretro.js"; then
                echo "✅ ra_get_ram_size 已导出"
              else
                echo "❌ ra_get_ram_size 未导出！"
              fi
            else
              echo "❌ 前端链接失败，未生成 .js/.wasm"
            fi

            make -f Makefile.emscripten clean 2>/dev/null || true
            cd ..
          done

      - name: Organize output
        run: |
          mkdir -p output/retroarch
          cp dist/*.js output/retroarch/ 2>/dev/null || true
          cp dist/*.wasm output/retroarch/ 2>/dev/null || true

          CORES_JSON=$(echo '${{ github.event.inputs.cores }}' \
            | tr ',' '\n' \
            | xargs -I{} echo '"{}"' \
            | tr '\n' ',' \
            | sed 's/,$//')

          cat > output/manifest.json << EOF
          {
            "built_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "retroarch_tag": "${{ github.event.inputs.retroarch_tag || 'v1.22.2' }}",
            "emscripten_version": "3.1.46",
            "features": {
              "memory_export": true,
              "cheevos": false,
              "networking": false,
              "opengles3": true
            },
            "cores": [$CORES_JSON]
          }
          EOF

          echo "📋 最终产物："
          ls -lh output/retroarch/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: retroarch-wasm-memory-export-${{ github.run_number }}
          path: output/
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "RetroArch WASM (Memory Export) ${{ github.ref_name }}"
          body: |
            ## RetroArch WASM（Memory Export 版）

            ### 编译参数
            - RetroArch: `${{ github.event.inputs.retroarch_tag || 'v1.22.2' }}`
            - Emscripten: `3.1.46`
            - `ra_memory_export.c` 导出 RAM 指针 ✅

            ### 导出函数
            - `Module._ra_get_ram_ptr()` → 模拟器系统 RAM 在 WASM 内存中的偏移
            - `Module._ra_get_ram_size()` → 系统 RAM 字节大小

            ### 使用方法
            ```typescript
            const emscripten = nostalgist.getEmscripten()
            const Module = emscripten.Module
            const ptr = Module._ra_get_ram_ptr()
            const size = Module._ra_get_ram_size()
            const ram = Module.HEAPU8.subarray(ptr, ptr + size)
            ```
          files: |
            output/retroarch/*.js
            output/retroarch/*.wasm
            output/manifest.json
          draft: false
          prerelease: false
