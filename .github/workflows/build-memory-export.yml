name: Build RetroArch WASM (Memory Export)

# 目标：编译导出 _retro_get_memory_data 的核心，供 RetroPlay JS 层读取模拟器 RAM
# 与 build-retroarch-wasm-cheevos.yml（RetroArch 内置 cheevos）不同：
#   - 不需要 HAVE_CHEEVOS / rcheevos
#   - 需要导出 _retro_get_memory_data / _retro_get_memory_size
#   - mgba 用 CMake 构建，其他核心用 Makefile

on:
  workflow_dispatch:
    inputs:
      retroarch_tag:
        description: 'RetroArch 版本 tag'
        required: false
        default: 'v1.22.2'
      cores:
        description: '要编译的 cores（逗号分隔）'
        required: false
        default: 'fceumm,mgba'

  push:
    tags:
      - 'memory-export-*'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential git python3 cmake ninja-build \
            pkg-config zlib1g-dev p7zip-full

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.46
          actions-cache-folder: 'emsdk-cache'

      - name: Cache RetroArch source
        uses: actions/cache@v4
        id: cache-retroarch
        with:
          path: RetroArch
          key: retroarch-src-${{ github.event.inputs.retroarch_tag || 'v1.22.2' }}

      - name: Clone RetroArch
        if: steps.cache-retroarch.outputs.cache-hit != 'true'
        run: |
          TAG="${{ github.event.inputs.retroarch_tag || 'v1.22.2' }}"
          git clone --depth=1 --branch "$TAG" https://github.com/libretro/RetroArch.git

      - name: Patch Makefile.emscripten — export retro_get_memory_data
        run: |
          cd RetroArch

          # 在 EXPORTED_FUNCTIONS 末尾追加内存导出函数
          # 原始列表以 EmscriptenReceiveCommandReply 结尾
          # 这些函数在核心的 .a 中定义，EXPORTED_FUNCTIONS 让 emscripten 从链接后的二进制导出
          sed -i 's/EmscriptenReceiveCommandReply/EmscriptenReceiveCommandReply","_retro_get_memory_data","_retro_get_memory_size/' Makefile.emscripten

          echo "=== 验证 EXPORTED_FUNCTIONS ==="
          grep "EXPORTED_FUNCTIONS" Makefile.emscripten | head -2

      - name: Build cores
        run: |
          declare -A CORE_REPOS
          CORE_REPOS["fceumm"]="libretro/libretro-fceumm"
          CORE_REPOS["snes9x"]="libretro/snes9x"
          CORE_REPOS["mgba"]="libretro/mgba"
          CORE_REPOS["genesis_plus_gx"]="libretro/Genesis-Plus-GX"
          CORE_REPOS["gambatte"]="libretro/gambatte-libretro"

          # CMake 构建的核心
          declare -A CORE_USE_CMAKE
          CORE_USE_CMAKE["mgba"]="1"

          CORES="${{ github.event.inputs.cores }}"
          mkdir -p dist

          IFS=',' read -ra CORE_LIST <<< "$CORES"
          for CORE in "${CORE_LIST[@]}"; do
            CORE=$(echo "$CORE" | xargs)
            REPO="${CORE_REPOS[$CORE]}"

            if [ -z "$REPO" ]; then
              echo "⚠️  未知 core: $CORE，跳过"
              continue
            fi

            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "🔨 编译 core: $CORE"
            echo "   repo: $REPO"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

            git clone --depth=1 "https://github.com/${REPO}.git" "core_${CORE}"
            cd "core_${CORE}"

            # ── 核心编译 ──
            if [ "${CORE_USE_CMAKE[$CORE]}" = "1" ]; then
              echo "📦 CMake 构建"
              mkdir -p build-emscripten && cd build-emscripten
              emcmake cmake .. \
                -DBUILD_LIBRETRO=ON \
                -DBUILD_STATIC=ON \
                -DBUILD_SHARED=OFF \
                -DBUILD_GL=OFF \
                -DBUILD_GLES2=OFF \
                -DBUILD_GLES3=OFF \
                -DBUILD_QT=OFF \
                -DBUILD_SDL=OFF \
                -DBUILD_PERF=OFF \
                -DBUILD_TEST=OFF \
                -DBUILD_SUITE=OFF \
                -DBUILD_DOCGEN=OFF \
                -DUSE_FFMPEG=OFF \
                -DUSE_SQLITE3=OFF \
                -DUSE_ELF=OFF \
                -DUSE_LIBZIP=OFF \
                -DUSE_PNG=OFF \
                -DUSE_EPOXY=OFF \
                -DENABLE_DEBUGGERS=OFF \
                -DCMAKE_C_FLAGS="-D_GNU_SOURCE" \
                -G Ninja 2>&1 | tail -10
              emmake ninja -j$(nproc) 2>&1 | tail -20
              cd ..
            else
              echo "📦 Makefile 构建"
              emmake make -f Makefile platform=emscripten -j$(nproc) 2>&1 | tail -30
            fi

            # ── 查找产物 ──
            if [ "${CORE_USE_CMAKE[$CORE]}" = "1" ]; then
              # CMake 产物：优先找 libretro 相关的 .a，排除核心库 libmgba.a
              BC_FILE=$(find build-emscripten -name "*.a" ! -name "libmgba.a" | head -1)
              if [ -z "$BC_FILE" ]; then
                BC_FILE=$(find build-emscripten -name "*.a" | head -1)
              fi
            else
              BC_FILE=$(find . -name "*_libretro_emscripten.bc" -o -name "*_libretro_emscripten.a" | head -1)
            fi

            if [ -z "$BC_FILE" ]; then
              echo "❌ 编译失败，未找到产物: $CORE"
              cd ..
              continue
            fi

            echo "✅ 核心编译成功: $BC_FILE"
            cp "$BC_FILE" ../RetroArch/libretro_emscripten.bc
            cd ..

            # ── 链接 RetroArch 前端 ──
            echo "🔗 链接 RetroArch 前端..."
            cd RetroArch

            emmake make -f Makefile.emscripten \
              LIBRETRO="${CORE}" \
              HAVE_NETWORKING=1 \
              HAVE_OPENGLES3=1 \
              -j$(nproc) 2>&1 | tail -30

            if [ -f "${CORE}_libretro.js" ] && [ -f "${CORE}_libretro.wasm" ]; then
              mkdir -p "../dist"
              cp "${CORE}_libretro.js" "../dist/"
              cp "${CORE}_libretro.wasm" "../dist/"
              echo "📦 产物: dist/${CORE}_libretro.js / .wasm"

              # 验证内存导出函数存在
              if grep -q "_retro_get_memory_data" "${CORE}_libretro.js"; then
                echo "✅ _retro_get_memory_data 已导出"
              else
                echo "⚠️  _retro_get_memory_data 未找到，检查 EXPORTED_FUNCTIONS"
              fi
            else
              echo "❌ 链接失败"
            fi

            make -f Makefile.emscripten clean 2>/dev/null || true
            cd ..
          done

      - name: Organize output
        run: |
          mkdir -p output/retroarch
          cp dist/*.js output/retroarch/ 2>/dev/null || true
          cp dist/*.wasm output/retroarch/ 2>/dev/null || true

          CORES_JSON=$(echo '${{ github.event.inputs.cores }}' \
            | tr ',' '\n' \
            | xargs -I{} echo '"{}"' \
            | tr '\n' ',' \
            | sed 's/,$//')

          cat > output/manifest.json << EOF
          {
            "built_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "retroarch_tag": "${{ github.event.inputs.retroarch_tag || 'v1.22.2' }}",
            "emscripten_version": "3.1.46",
            "features": {
              "memory_export": true,
              "networking": true,
              "opengles3": true
            },
            "cores": [$CORES_JSON]
          }
          EOF

          echo "📋 最终产物："
          ls -lh output/retroarch/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: retroarch-memory-export-${{ github.run_number }}
          path: output/
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "RetroArch WASM (Memory Export) ${{ github.ref_name }}"
          body: |
            ## RetroArch WASM — 内存导出版

            导出 `_retro_get_memory_data` / `_retro_get_memory_size`，供 RetroPlay JS 层读取模拟器 RAM。

            ### 编译参数
            - RetroArch: `${{ github.event.inputs.retroarch_tag || 'v1.22.2' }}`
            - Emscripten: `3.1.46`
            - `_retro_get_memory_data` ✅ 已导出
            - `_retro_get_memory_size` ✅ 已导出

            ### 包含 Cores
            ${{ github.event.inputs.cores }}

            ### 使用方法
            ```typescript
            const ptr = Module._retro_get_memory_data(2); // SYSTEM_RAM
            const size = Module._retro_get_memory_size(2);
            const ram = Module.HEAPU8.slice(ptr, ptr + size);
            ```
          files: |
            output/retroarch/*.js
            output/retroarch/*.wasm
            output/manifest.json
          draft: false
          prerelease: false
